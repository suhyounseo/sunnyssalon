<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>써니스살롱 2026 S/S Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F5F0;--white:#FFFEFB;--black:#1A1714;
  --warm:#D4B896;--warm-dark:#8B6A45;--warm-light:#EDE5D8;
  --gray:#9A938C;--light:#ECE8E2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--black);min-height:100vh}

/* ── 헤더 ── */
.site-header{
  background:var(--black);color:var(--white);
  text-align:center;padding:40px 20px 36px;
  position:relative;overflow:hidden;
}
.site-header::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 41px);
}
.brand-sub{font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.5em;color:var(--warm);text-transform:uppercase;margin-bottom:12px}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3.4rem);font-weight:400;letter-spacing:.15em;margin-bottom:8px}
.brand-season{font-size:.72rem;letter-spacing:.3em;color:rgba(255,255,255,.4);text-transform:uppercase}
.header-line{width:40px;height:1px;background:var(--warm);margin:20px auto 0}

/* ── 필터 탭 ── */
.filter-bar{
  position:sticky;top:0;z-index:100;
  background:rgba(248,245,240,.95);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--light);
  padding:0 16px;overflow-x:auto;
  display:flex;gap:4px;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:14px 16px;
  font-size:.72rem;letter-spacing:.08em;color:var(--gray);
  border:none;background:none;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;
}
.filter-btn.active{color:var(--black);border-bottom-color:var(--warm-dark)}

/* ── 상품 그리드 ── */
.products-wrap{max-width:1100px;margin:0 auto;padding:40px 16px 80px}
.trader-section{margin-bottom:56px}
.trader-head{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:24px;padding-bottom:12px;
  border-bottom:1px solid var(--light);
}
.trader-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:500;letter-spacing:.08em}
.trader-count{font-size:.72rem;color:var(--gray);letter-spacing:.05em}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
@media(min-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}

.card{
  background:var(--white);border-radius:10px;overflow:hidden;
  cursor:pointer;transition:transform .25s,box-shadow .25s;
  border:1px solid transparent;
}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1);border-color:var(--warm-light)}
.card:active{transform:translateY(-1px)}

.card-img{
  aspect-ratio:3/4;overflow:hidden;background:var(--light);
  position:relative;
}
.card-img img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s;display:block;
}
.card:hover .card-img img{transform:scale(1.06)}
.card-img .no-img{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--warm);opacity:.5;font-size:.7rem;letter-spacing:.05em;
}

/* 가격 여부 배지 */
.card-img .badge-wrap{position:absolute;top:8px;left:8px}
.badge-ready{
  background:var(--black);color:var(--white);
  font-size:.6rem;letter-spacing:.05em;padding:3px 7px;border-radius:20px;
}
.badge-prep{
  background:rgba(255,255,255,.85);color:var(--gray);
  font-size:.6rem;letter-spacing:.05em;padding:3px 7px;border-radius:20px;
  border:1px solid var(--light);
}

.card-body{padding:12px 14px 16px}
.card-trader{font-size:.65rem;color:var(--gray);letter-spacing:.08em;margin-bottom:3px}
.card-name{font-size:.85rem;font-weight:500;color:var(--black);line-height:1.4;margin-bottom:4px}
.card-color{font-size:.72rem;color:var(--gray);margin-bottom:8px}
.card-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--warm-dark)}
.card-price-prep{font-size:.72rem;color:var(--gray);letter-spacing:.04em}
.card-cat{display:inline-block;font-size:.62rem;padding:2px 7px;background:var(--light);border-radius:12px;color:var(--gray);margin-top:6px}

/* ── 상세 오버레이 ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(26,23,20,.7);backdrop-filter:blur(4px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.overlay.open{display:block}
.detail{
  background:var(--white);margin:0 auto;max-width:880px;
  min-height:100vh;position:relative;
}
@media(min-width:900px){.detail{margin:40px auto;min-height:auto;border-radius:14px;overflow:hidden}}

/* 상세 상단바 */
.det-bar{
  position:sticky;top:0;z-index:10;background:var(--white);
  border-bottom:1px solid var(--light);
  padding:14px 20px;display:flex;align-items:center;gap:16px;
}
.close-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--light);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--black);font-size:1rem;flex-shrink:0;transition:all .2s;
}
.close-btn:hover{background:var(--light)}
.det-breadcrumb{font-size:.75rem;color:var(--gray);letter-spacing:.04em}

/* 상세 내용 */
.det-body{padding:0 0 60px}
.det-top{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:600px){.det-top{grid-template-columns:1fr 1fr}}

/* 갤러리 */
.gallery{background:var(--light);position:relative}
.gallery-main{aspect-ratio:3/4;overflow:hidden;position:relative}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:opacity .3s}
.gallery-main .no-img-big{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:var(--warm);
}
.gallery-main .no-img-big svg{opacity:.3}
.gallery-thumbs{
  display:flex;gap:6px;padding:10px;flex-wrap:wrap;
  background:rgba(0,0,0,.03);
}
.gallery-thumbs img{
  width:52px;height:52px;object-fit:cover;border-radius:6px;
  cursor:pointer;border:2px solid transparent;transition:all .2s;opacity:.65;
}
.gallery-thumbs img.on,.gallery-thumbs img:hover{border-color:var(--warm-dark);opacity:1}
.gdrive-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin:10px;padding:10px;border-radius:8px;
  background:var(--black);color:var(--white);
  font-size:.72rem;letter-spacing:.06em;text-decoration:none;
  transition:opacity .2s;
}
.gdrive-btn:hover{opacity:.8}

/* 상세 정보 */
.det-info{padding:28px 24px}
.det-trader{font-size:.7rem;letter-spacing:.15em;color:var(--warm-dark);text-transform:uppercase;margin-bottom:8px}
.det-name{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:500;line-height:1.35;color:var(--black);margin-bottom:4px}
.det-id{font-size:.75rem;color:var(--gray);margin-bottom:16px}
.det-price-wrap{margin-bottom:20px}
.det-price{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--black)}
.det-price-prep-msg{font-size:.78rem;color:var(--gray);padding:8px 12px;background:var(--light);border-radius:6px;display:inline-block}
.det-color{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid var(--light);border-radius:7px;font-size:.8rem;margin-bottom:18px}
.cdot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
.det-desc{font-size:.85rem;line-height:1.85;color:var(--gray);padding:14px 16px;background:var(--bg);border-radius:8px;border-left:2px solid var(--warm);margin-bottom:4px}

/* 섹션 */
.det-section{padding:20px 24px;border-top:1px solid var(--light)}
.sec-label{font-size:.68rem;letter-spacing:.15em;color:var(--warm-dark);text-transform:uppercase;margin-bottom:14px}

.mat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mat-item{background:var(--bg);border-radius:8px;padding:14px;text-align:center}
.mat-key{font-size:.65rem;color:var(--gray);letter-spacing:.08em;margin-bottom:5px}
.mat-val{font-size:.8rem;font-weight:500;color:var(--black);line-height:1.45}

.size-table{width:100%;border-collapse:collapse;font-size:.82rem}
.size-table th{background:var(--black);color:var(--white);padding:10px 12px;text-align:center;font-size:.7rem;font-weight:400;letter-spacing:.06em}
.size-table td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--light)}
.size-table tr:nth-child(even) td{background:var(--bg)}
.size-table td:first-child{font-weight:600;color:var(--warm-dark)}
.size-prep{text-align:center;padding:20px;color:var(--gray);font-size:.82rem;background:var(--bg);border-radius:8px}

.wear-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.wear-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:7px;font-size:.8rem}
.wear-key{color:var(--gray)}
.tag{display:inline-block;padding:2px 8px;border-radius:14px;font-size:.68rem;font-weight:500}
.tag-y{background:#E8F5E9;color:#2E7D32}
.tag-n{background:#F5F5F5;color:#999}
.tag-s{background:#FFF8E1;color:#E65100}
.tag-d{background:var(--light);color:var(--gray)}

.model-bar{background:var(--black);color:var(--white);border-radius:10px;padding:16px 20px;display:flex;gap:24px;flex-wrap:wrap}
.ms{text-align:center;flex:1;min-width:40px}
.ms-k{font-size:.62rem;color:rgba(255,255,255,.4);letter-spacing:.1em;margin-bottom:4px}
.ms-v{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--warm)}

.notice{background:linear-gradient(135deg,#FFF8F0,#FAF0E8);border:1px solid var(--warm-light);border-radius:10px;padding:16px 20px}
.notice p{font-size:.78rem;color:var(--gray);line-height:2;padding-left:12px;text-indent:-12px}
.notice p::before{content:'· ';color:var(--warm)}

/* 이전/다음 */
.det-nav{display:flex;justify-content:space-between;gap:12px;padding:20px 24px;border-top:1px solid var(--light)}
.nav-btn{
  flex:1;padding:12px;border:1px solid var(--light);
  border-radius:8px;background:none;cursor:pointer;
  font-size:.78rem;color:var(--black);transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.nav-btn:hover{background:var(--bg);border-color:var(--warm)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-label{font-size:.65rem;color:var(--gray);letter-spacing:.05em}
.nav-name{font-size:.78rem;font-weight:500;color:var(--black)}

@media(max-width:599px){
  .det-info{padding:20px 16px}
  .det-section{padding:16px}
  .mat-row{grid-template-columns:repeat(3,1fr)}
  .wear-grid{grid-template-columns:1fr}
  .det-nav{padding:16px}
}
</style>
</head>

   fab:'폴리혼방',lin:'폴리에스터 100%',wash:'손세탁 권장',
   s:{c:'',w:'',h:'',l:''},m:{c:'',w:'',h:'',l:''},l:{c:'',w:'',h:'',l:''},
   st:'있음',inn:'있음',see:'없음',thk:'보통',zip:'뒷지퍼',
   mh:'',mw:'',mc:'',mwa:'',mhi:'',msz:'',fid:'1lkXRDVqnwdYRVIQfF-WiE7b475Sy0-GK'},
];

// ══════════════════════════════════════
// 헬퍼
// ══════════════════════════════════════
const colorCSS = c => {
  const m={화이트:'#F5F5F0',블랙:'#2A2A2A',핑크:'#F4B8B8',네이비:'#2A3A5C',그레이:'#9E9E9E',
    베이지:'#D4B896',소라:'#8EC5D6',레드:'#C24B3A',블루:'#4A7CC4',다크민트:'#5A9E8A',
    브라운:'#8B6347',연보라:'#C5AADC',엘로우:'#F5D97A',아이보리:'#F5F0E0',민트:'#7ECEC4'};
  return m[(c||'').split('/')[0].trim()]||'#C8A882';
};
const tagBadge = (v,type='yn') => {
  if(!v) return `<span class="tag tag-d">-</span>`;
  if(type==='stretch'){
    if(v==='있음') return `<span class="tag tag-y">있음</span>`;
    if(v==='약간') return `<span class="tag tag-s">약간</span>`;
    if(v==='적음') return `<span class="tag tag-n">적음</span>`;
    return `<span class="tag tag-d">${v}</span>`;
  }
  if(v==='있음') return `<span class="tag tag-y">있음</span>`;
  if(v==='없음') return `<span class="tag tag-n">없음</span>`;
  return `<span class="tag tag-d">${v}</span>`;
};
const vv = x => (x!==undefined&&x!==''&&x!==null)?x:'-';

// ══════════════════════════════════════
// 인덱스 렌더
// ══════════════════════════════════════
function renderIndex(filter) {
  const traders = {};
  P.forEach(p => {
    if(filter && filter!=='전체' && p.tr!==filter) return;
    if(!traders[p.tr]) traders[p.tr]=[];
    traders[p.tr].push(p);
  });

  let html = '';
  for(const [tr,items] of Object.entries(traders)){
    html += `<div class="trader-section" data-trader="${tr}">
      <div class="trader-head">
        <span class="trader-name">${tr}</span>
        <span class="trader-count">${items.length}개</span>
      </div>
      <div class="grid">`;
    items.forEach(p => {
      const ready = !!p.price;
      const imgUrl = `https://drive.google.com/thumbnail?id=${p.fid}&sz=w400`;
      html += `<div class="card" onclick="openDetail(${p.no})">
        <div class="card-img">
          <img src="${imgUrl}" alt="${p.id}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=no-img><svg width=28 height=28 fill=none viewBox=&quot;0 0 24 24&quot; stroke=currentColor opacity=.3><path stroke-linecap=round stroke-linejoin=round stroke-width=1.5 d=&quot;M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z&quot;/></svg></div>'">
          <div class="badge-wrap">
            ${ready?`<span class="badge-ready">₩${p.price}</span>`:`<span class="badge-prep">준비중</span>`}
          </div>
        </div>
        <div class="card-body">
          <div class="card-trader">${p.tr}</div>
          <div class="card-name">${p.id}</div>
          ${p.col?`<div class="card-color">${p.col}</div>`:''}
          ${ready?`<div class="card-price">₩${p.price}</div>`:`<div class="card-price-prep">사이즈 정보 준비중</div>`}
          <div class="card-cat">${p.cat}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  }
  document.getElementById('products-wrap').innerHTML = html;
}

// ── 필터 ──
function renderFilter(){
  const traders = [...new Set(P.map(p=>p.tr))];
  const bar = document.getElementById('filter-bar');
  const btns = ['전체', ...traders].map(t=>`<button class="filter-btn${t==='전체'?' active':''}" onclick="setFilter(this,'${t}')">${t}</button>`);
  bar.innerHTML = btns.join('');
}
function setFilter(btn, tr){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderIndex(tr);
}

// ══════════════════════════════════════
// 상세 오버레이
// ══════════════════════════════════════
let curIdx = 0;
function openDetail(no){
  curIdx = P.findIndex(p=>p.no===no);
  buildDetail(P[curIdx]);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  window.scrollTo(0,0);
}
function closeDetail(e){
  if(e&&e.target!==document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeDet(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function navDet(dir){
  const ni=curIdx+dir;
  if(ni<0||ni>=P.length) return;
  curIdx=ni;
  buildDetail(P[ni]);
  document.getElementById('detail-panel').scrollTop=0;
}
function switchImg(url,el){
  document.querySelector('#detail-panel .gallery-main img').src=url;
  document.querySelectorAll('#detail-panel .gallery-thumbs img').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
}

function buildDetail(p){
  const panel = document.getElementById('detail-panel');
  const hasSz = p.s.c !== '';
  const hasModel = p.mh !== '';
  const imgUrl = `https://drive.google.com/thumbnail?id=${p.fid}&sz=w800`;

  // 썸네일 여러장 (같은 폴더에서 다양한 사이즈로 요청)
  const thumbSizes = [800,400,600,300,500,350,250];
  const thumbs = thumbSizes.slice(0,6).map((sz,i)=>{
    const url=`https://drive.google.com/thumbnail?id=${p.fid}&sz=w${sz}`;
    return `<img src="${url}" class="${i===0?'on':''}" onclick="switchImg('${url}',this)" loading="lazy" onerror="this.style.display='none'">`;
  }).join('');

  const sizeRows = hasSz ? `
    <tr><td>S (55)</td><td>${vv(p.s.c)}</td><td>${vv(p.s.w)}</td><td>${vv(p.s.h)}</td><td>${vv(p.s.l)}</td></tr>
    <tr><td>M (66)</td><td>${vv(p.m.c)}</td><td>${vv(p.m.w)}</td><td>${vv(p.m.h)}</td><td>${vv(p.m.l)}</td></tr>
    <tr><td>L (77)</td><td>${vv(p.l.c)}</td><td>${vv(p.l.w)}</td><td>${vv(p.l.h)}</td><td>${vv(p.l.l)}</td></tr>
  ` : '';

  panel.innerHTML = `
    <div class="det-bar">
      <button class="close-btn" onclick="closeDet()">✕</button>
      <span class="det-breadcrumb">${p.tr} · ${p.id}</span>
    </div>
    <div class="det-body">
      <div class="det-top">
        <div class="gallery">
          <div class="gallery-main">
            <img src="${imgUrl}" alt="${p.id}" onerror="this.parentElement.innerHTML='<div class=no-img-big><svg width=52 height=52 fill=none viewBox=&quot;0 0 24 24&quot; stroke=currentColor><path stroke-linecap=round stroke-linejoin=round stroke-width=1 d=&quot;M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z&quot;/></svg></div>'">
          </div>
          <div class="gallery-thumbs">${thumbs}</div>
          <a href="${driveFolderUrl(p.fid)}" target="_blank" class="gdrive-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.28 3l5.22 9.03L5.72 21H2.1l5.78-9.97L2.1 3h4.18zm4.44 0h4.18l5.78 9.97L15.28 21h-4.18l5.78-9.97L11.72 3zm6.44 0h4.18l-5.78 9.97 5.78 9.97h-4.18l-5.78-9.97z"/></svg>
            전체 사진 보기
          </a>
        </div>
        <div class="det-info">
          <div class="det-trader">${p.tr}</div>
          <div class="det-name">${p.desc||p.id}</div>
          <div class="det-id">${p.id}</div>
          ${p.col?`<div class="det-color"><span class="cdot" style="background:${colorCSS(p.col)}"></span>${p.col}</div>`:''}
          <div class="det-price-wrap">
            ${p.price?`<div class="det-price">₩${p.price}</div>`:`<span class="det-price-prep-msg">사이즈 정보 준비중입니다</span>`}
          </div>
          ${p.desc?`<div class="det-desc">${p.desc}</div>`:''}
        </div>
      </div>

      <div class="det-section">
        <div class="sec-label">소재 정보</div>
        <div class="mat-row">
          <div class="mat-item"><div class="mat-key">겉감</div><div class="mat-val">${vv(p.fab)}</div></div>
          <div class="mat-item"><div class="mat-key">안감</div><div class="mat-val">${vv(p.lin)}</div></div>
          <div class="mat-item"><div class="mat-key">세탁</div><div class="mat-val">${vv(p.wash)}</div></div>
        </div>
      </div>

      <div class="det-section">
        <div class="sec-label">사이즈 가이드 (실측 cm)</div>
        ${hasSz?`<table class="size-table">
          <thead><tr><th>사이즈</th><th>가슴</th><th>허리</th><th>엉덩이</th><th>기장</th></tr></thead>
          <tbody>${sizeRows}</tbody>
        </table>`:`<div class="size-prep">사이즈 정보 준비중입니다</div>`}
      </div>

      ${(p.st||p.inn||p.see||p.thk||p.zip)?`
      <div class="det-section">
        <div class="sec-label">착용 특성</div>
        <div class="wear-grid">
          <div class="wear-item"><span class="wear-key">신축성</span>${tagBadge(p.st,'stretch')}</div>
          <div class="wear-item"><span class="wear-key">안감</span>${tagBadge(p.inn)}</div>
          <div class="wear-item"><span class="wear-key">비침</span>${tagBadge(p.see)}</div>
          <div class="wear-item"><span class="wear-key">두께감</span><span class="tag tag-d">${vv(p.thk)}</span></div>
          ${p.zip?`<div class="wear-item"><span class="wear-key">지퍼</span><span class="tag tag-d">${p.zip}</span></div>`:''}
        </div>
      </div>`:''}

      ${hasModel?`
      <div class="det-section">
        <div class="sec-label">모델 착용 정보</div>
        <div class="model-bar">
          ${p.mh?`<div class="ms"><div class="ms-k">키</div><div class="ms-v">${p.mh}cm</div></div>`:''}
          ${p.mw?`<div class="ms"><div class="ms-k">체중</div><div class="ms-v">${p.mw}kg</div></div>`:''}
          ${p.mc?`<div class="ms"><div class="ms-k">가슴</div><div class="ms-v">${p.mc}cm</div></div>`:''}
          ${p.mwa?`<div class="ms"><div class="ms-k">허리</div><div class="ms-v">${p.mwa}</div></div>`:''}
          ${p.mhi?`<div class="ms"><div class="ms-k">엉덩이</div><div class="ms-v">${p.mhi}cm</div></div>`:''}
          ${p.msz?`<div class="ms"><div class="ms-k">착용 사이즈</div><div class="ms-v">${p.msz}</div></div>`:''}
        </div>
      </div>`:''}

      <div class="det-section">
        <div class="sec-label">세탁 주의사항</div>
        <div class="notice">
          <p>${p.wash}</p>
          <p>세탁 시 단독 세탁을 권장합니다</p>
          <p>직사광선을 피해 건조하세요</p>
          <p>색상은 모니터 환경에 따라 실제와 다소 차이가 있을 수 있습니다</p>
          <p>상품 특성상 1~3cm 오차가 있을 수 있습니다</p>
        </div>
      </div>

      <div class="det-nav">
        <button class="nav-btn" onclick="navDet(-1)" ${curIdx===0?'disabled':''}>
          <span class="nav-label">← 이전</span>
          <span class="nav-name">${curIdx>0?P[curIdx-1].id:''}</span>
        </button>
        <button class="nav-btn" onclick="navDet(1)" ${curIdx===P.length-1?'disabled':''}>
          <span class="nav-label">다음 →</span>
          <span class="nav-name">${curIdx<P.length-1?P[curIdx+1].id:''}</span>
        </button>
      </div>
    </div>
  `;
}

// ── 초기화 ──
renderFilter();
renderIndex();
</script>
</body>
</html>
