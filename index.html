<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>써니스살롱 2026 S/S Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F5F0;--white:#FFFEFB;--black:#1A1714;--warm:#D4B896;--warm-dark:#8B6A45;--warm-light:#EDE5D8;--gray:#9A938C;--light:#ECE8E2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--black)}
.site-header{background:var(--black);color:var(--white);text-align:center;padding:40px 20px 32px}
.brand-sub{font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.5em;color:var(--warm);text-transform:uppercase;margin-bottom:12px}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3.4rem);font-weight:400;letter-spacing:.15em;margin-bottom:8px}
.brand-season{font-size:.72rem;letter-spacing:.3em;color:rgba(255,255,255,.4);text-transform:uppercase}
.header-line{width:40px;height:1px;background:var(--warm);margin:18px auto 0}
.filter-bar{position:sticky;top:0;z-index:100;background:rgba(248,245,240,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--light);padding:0 16px;overflow-x:auto;display:flex;gap:4px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:13px 16px;font-size:.72rem;letter-spacing:.08em;color:var(--gray);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.filter-btn.on{color:var(--black);border-bottom-color:var(--warm-dark)}
.wrap{max-width:1100px;margin:0 auto;padding:40px 16px 80px}
.trader-sec{margin-bottom:52px}
.trader-head{display:flex;align-items:baseline;gap:12px;margin-bottom:22px;padding-bottom:10px;border-bottom:1px solid var(--light)}
.trader-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:500;letter-spacing:.08em}
.trader-cnt{font-size:.72rem;color:var(--gray)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
@media(min-width:540px){.grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}}
.card{background:var(--white);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid transparent}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.09);border-color:var(--warm-light)}
.card:active{transform:translateY(-1px)}
.card-img{aspect-ratio:3/4;overflow:hidden;background:var(--light);position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;display:block}
.card:hover .card-img img{transform:scale(1.06)}
.card-img .no-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--warm);opacity:.35}
.price-tag{position:absolute;top:8px;left:8px;font-size:.6rem;padding:3px 7px;border-radius:20px;font-family:inherit}
.price-tag.ready{background:var(--black);color:var(--white)}
.price-tag.prep{background:rgba(255,255,255,.85);color:var(--gray);border:1px solid var(--light)}
.card-body{padding:11px 13px 14px}
.card-tr{font-size:.64rem;color:var(--gray);letter-spacing:.07em;margin-bottom:2px}
.card-name{font-size:.84rem;font-weight:500;color:var(--black);line-height:1.4;margin-bottom:3px}
.card-col{font-size:.71rem;color:var(--gray);margin-bottom:7px}
.card-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--warm-dark)}
.card-prep{font-size:.69rem;color:var(--gray)}
.card-cat{display:inline-block;font-size:.61rem;padding:2px 7px;background:var(--light);border-radius:12px;color:var(--gray);margin-top:5px}
/* 오버레이 */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,23,20,.7);backdrop-filter:blur(4px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay.open{display:block}
.det{background:var(--white);margin:0 auto;max-width:860px;min-height:100vh}
@media(min-width:900px){.det{margin:40px auto;min-height:auto;border-radius:14px;overflow:hidden}}
.det-bar{position:sticky;top:0;z-index:10;background:var(--white);border-bottom:1px solid var(--light);padding:13px 18px;display:flex;align-items:center;gap:14px}
.close-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--light);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;transition:background .2s}
.close-btn:hover{background:var(--light)}
.det-bc{font-size:.74rem;color:var(--gray)}
.det-body{padding-bottom:60px}
.det-top{display:grid;grid-template-columns:1fr}
@media(min-width:560px){.det-top{grid-template-columns:1fr 1fr}}
.gallery{background:var(--light)}
.g-main{aspect-ratio:3/4;overflow:hidden;position:relative;background:var(--light)}
.g-main img{width:100%;height:100%;object-fit:cover;display:block}
.g-main .g-no{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--warm);opacity:.3}
.g-link{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px;padding:10px;border-radius:8px;background:var(--black);color:var(--white);font-size:.72rem;letter-spacing:.06em;text-decoration:none;transition:opacity .2s}
.g-link:hover{opacity:.8}
.det-info{padding:24px 20px}
.det-tr{font-size:.7rem;letter-spacing:.14em;color:var(--warm-dark);text-transform:uppercase;margin-bottom:7px}
.det-name{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:500;line-height:1.35;color:var(--black);margin-bottom:4px}
.det-id{font-size:.74rem;color:var(--gray);margin-bottom:14px}
.det-price{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--black);margin-bottom:18px}
.det-prep-msg{font-size:.78rem;color:var(--gray);padding:8px 12px;background:var(--light);border-radius:6px;display:inline-block;margin-bottom:18px}
.det-color{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border:1px solid var(--light);border-radius:7px;font-size:.8rem;margin-bottom:16px}
.cdot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.det-desc{font-size:.84rem;line-height:1.85;color:var(--gray);padding:13px 15px;background:var(--bg);border-radius:8px;border-left:2px solid var(--warm);margin-bottom:4px}
.det-sec{padding:18px 20px;border-top:1px solid var(--light)}
.sec-lbl{font-size:.67rem;letter-spacing:.15em;color:var(--warm-dark);text-transform:uppercase;margin-bottom:13px}
.mat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.mat-item{background:var(--bg);border-radius:8px;padding:13px;text-align:center}
.mat-k{font-size:.64rem;color:var(--gray);letter-spacing:.08em;margin-bottom:4px}
.mat-v{font-size:.8rem;font-weight:500;color:var(--black);line-height:1.45}
.sz-table{width:100%;border-collapse:collapse;font-size:.82rem}
.sz-table th{background:var(--black);color:var(--white);padding:10px 12px;text-align:center;font-size:.69rem;font-weight:400;letter-spacing:.06em}
.sz-table td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--light)}
.sz-table tr:nth-child(even) td{background:var(--bg)}
.sz-table td:first-child{font-weight:600;color:var(--warm-dark)}
.sz-prep{text-align:center;padding:18px;color:var(--gray);font-size:.82rem;background:var(--bg);border-radius:8px}
.wear-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.wear-item{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--bg);border-radius:7px;font-size:.8rem}
.wear-k{color:var(--gray)}
.tag{display:inline-block;padding:2px 8px;border-radius:14px;font-size:.68rem;font-weight:500}
.t-y{background:#E8F5E9;color:#2E7D32}.t-n{background:#F5F5F5;color:#999}.t-s{background:#FFF8E1;color:#E65100}.t-d{background:var(--light);color:var(--gray)}
.model-bar{background:var(--black);color:var(--white);border-radius:10px;padding:15px 20px;display:flex;gap:22px;flex-wrap:wrap}
.ms{text-align:center;flex:1;min-width:36px}
.ms-k{font-size:.61rem;color:rgba(255,255,255,.4);letter-spacing:.1em;margin-bottom:3px}
.ms-v{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--warm)}
.notice{background:linear-gradient(135deg,#FFF8F0,#FAF0E8);border:1px solid var(--warm-light);border-radius:10px;padding:15px 18px}
.notice p{font-size:.78rem;color:var(--gray);line-height:2;padding-left:12px;text-indent:-12px}
.notice p::before{content:'· ';color:var(--warm)}
.det-nav{display:flex;justify-content:space-between;gap:10px;padding:18px 20px;border-top:1px solid var(--light)}
.nav-btn{flex:1;padding:11px;border:1px solid var(--light);border-radius:8px;background:none;cursor:pointer;font-size:.78rem;color:var(--black);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.nav-btn:hover{background:var(--bg);border-color:var(--warm)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-lbl{font-size:.64rem;color:var(--gray)}
@media(max-width:559px){.det-info{padding:18px 15px}.det-sec{padding:15px}.wear-grid{grid-template-columns:1fr}.det-nav{padding:14px 15px}}
</style>
</head>

// ── 렌더 ──
let curIdx=0;
function renderFilter(){
  const trs=[...new Set(P.map(p=>p.tr))];
  document.getElementById('fbar').innerHTML=
    ['전체',...trs].map((t,i)=>`<button class="filter-btn${i===0?' on':''}" onclick="setFilter(this,'${t}')">${t}</button>`).join('');
}
function setFilter(btn,tr){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(tr);
}
function renderCards(filter){
  const traders={};
  P.forEach(p=>{
    if(filter&&filter!=='전체'&&p.tr!==filter) return;
    if(!traders[p.tr]) traders[p.tr]=[];
    traders[p.tr].push(p);
  });
  let html='';
  for(const[tr,items] of Object.entries(traders)){
    html+=`<div class="trader-sec"><div class="trader-head"><span class="trader-name">${tr}</span><span class="trader-cnt">${items.length}개</span></div><div class="grid">`;
    items.forEach(p=>{
      const iUrl=img(p.fid);
      html+=`<div class="card" onclick="openDet(${p.no})">
        <div class="card-img">
          ${iUrl?`<img src="${iUrl}" alt="${p.id}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
          <div class="no-img" style="${iUrl?'display:none':''}">
            <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>
          <span class="price-tag ${p.price?'ready':'prep'}">${p.price?'₩'+p.price:'준비중'}</span>
        </div>
        <div class="card-body">
          <div class="card-tr">${p.tr}</div>
          <div class="card-name">${p.id}</div>
          ${p.col?`<div class="card-col">${p.col}</div>`:''}
          ${p.price?`<div class="card-price">₩${p.price}</div>`:`<div class="card-prep">사이즈 정보 준비중</div>`}
          <span class="card-cat">${p.cat}</span>
        </div>
      </div>`;
    });
    html+='</div></div>';
  }
  document.getElementById('wrap').innerHTML=html;
}
function openDet(no){
  curIdx=P.findIndex(p=>p.no===no);
  buildDet(P[curIdx]);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOv(e){
  if(e&&e.target!==document.getElementById('overlay')) return;
  closeDet();
}
function closeDet(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function navDet(d){
  const ni=curIdx+d;
  if(ni>=0&&ni<P.length){curIdx=ni;buildDet(P[ni]);document.getElementById('det').scrollTop=0;}
}
function buildDet(p){
  const iUrl=img(p.fid);
  const hasSz=p.s&&p.s.c!=='';
  const hasM=p.mh!=='';
  const szRows=hasSz?`
    <tr><td>S (55)</td><td>${vv(p.s.c)}</td><td>${vv(p.s.w)}</td><td>${vv(p.s.h)}</td><td>${vv(p.s.l)}</td></tr>
    <tr><td>M (66)</td><td>${vv(p.m.c)}</td><td>${vv(p.m.w)}</td><td>${vv(p.m.h)}</td><td>${vv(p.m.l)}</td></tr>
    <tr><td>L (77)</td><td>${vv(p.l.c)}</td><td>${vv(p.l.w)}</td><td>${vv(p.l.h)}</td><td>${vv(p.l.l)}</td></tr>`:'';
  document.getElementById('det').innerHTML=`
    <div class="det-bar">
      <button class="close-btn" onclick="closeDet()">✕</button>
      <span class="det-bc">${p.tr} · ${p.id}</span>
    </div>
    <div class="det-body">
      <div class="det-top">
        <div class="gallery">
          <div class="g-main">
            ${iUrl
              ?`<img src="${iUrl}" alt="${p.id}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              :''}
            <div class="g-no" style="${iUrl?'display:none':''}">
              <svg width="52" height="52" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
          </div>
          <a href="${folderUrl(p.fid)}" target="_blank" class="g-link">
            📁 전체 사진 보기 (Google Drive)
          </a>
        </div>
        <div class="det-info">
          <div class="det-tr">${p.tr}</div>
          <div class="det-name">${p.desc||p.id}</div>
          <div class="det-id">${p.id}</div>
          ${p.col?`<div class="det-color"><span class="cdot" style="background:${colorCSS(p.col)}"></span>${p.col}</div>`:''}
          ${p.price?`<div class="det-price">₩${p.price}</div>`:`<span class="det-prep-msg">사이즈 정보 준비중입니다</span>`}
          ${p.desc?`<div class="det-desc">${p.desc}</div>`:''}
        </div>
      </div>
      <div class="det-sec">
        <div class="sec-lbl">소재 정보</div>
        <div class="mat-row">
          <div class="mat-item"><div class="mat-k">겉감</div><div class="mat-v">${vv(p.fab)}</div></div>
          <div class="mat-item"><div class="mat-k">안감</div><div class="mat-v">${vv(p.lin)}</div></div>
          <div class="mat-item"><div class="mat-k">세탁</div><div class="mat-v">${vv(p.wash)}</div></div>
        </div>
      </div>
      <div class="det-sec">
        <div class="sec-lbl">사이즈 가이드 (실측 cm)</div>
        ${hasSz?`<table class="sz-table"><thead><tr><th>사이즈</th><th>가슴</th><th>허리</th><th>엉덩이</th><th>기장</th></tr></thead><tbody>${szRows}</tbody></table>`:`<div class="sz-prep">사이즈 정보 준비중입니다</div>`}
      </div>
      ${(p.st||p.inn||p.see||p.thk||p.zip)?`
      <div class="det-sec">
        <div class="sec-lbl">착용 특성</div>
        <div class="wear-grid">
          <div class="wear-item"><span class="wear-k">신축성</span>${tag(p.st,'s')}</div>
          <div class="wear-item"><span class="wear-k">안감</span>${tag(p.inn)}</div>
          <div class="wear-item"><span class="wear-k">비침</span>${tag(p.see)}</div>
          <div class="wear-item"><span class="wear-k">두께감</span><span class="tag t-d">${vv(p.thk)}</span></div>
          ${p.zip?`<div class="wear-item"><span class="wear-k">지퍼</span><span class="tag t-d">${p.zip}</span></div>`:''}
        </div>
      </div>`:''}
      ${hasM?`
      <div class="det-sec">
        <div class="sec-lbl">모델 착용 정보</div>
        <div class="model-bar">
          ${p.mh?`<div class="ms"><div class="ms-k">키</div><div class="ms-v">${p.mh}cm</div></div>`:''}
          ${p.mw?`<div class="ms"><div class="ms-k">체중</div><div class="ms-v">${p.mw}kg</div></div>`:''}
          ${p.mc?`<div class="ms"><div class="ms-k">가슴</div><div class="ms-v">${p.mc}</div></div>`:''}
          ${p.mwa?`<div class="ms"><div class="ms-k">허리</div><div class="ms-v">${p.mwa}</div></div>`:''}
          ${p.mhi?`<div class="ms"><div class="ms-k">엉덩이</div><div class="ms-v">${p.mhi}cm</div></div>`:''}
          ${p.msz?`<div class="ms"><div class="ms-k">착용 사이즈</div><div class="ms-v">${p.msz}</div></div>`:''}
        </div>
      </div>`:''}
      <div class="det-sec">
        <div class="sec-lbl">세탁 주의사항</div>
        <div class="notice">
          <p>${p.wash||'손세탁 권장'}</p>
          <p>세탁 시 단독 세탁을 권장합니다</p>
          <p>직사광선을 피해 건조하세요</p>
          <p>색상은 모니터 환경에 따라 실제와 다소 차이가 있을 수 있습니다</p>
          <p>상품 특성상 1~3cm 오차가 있을 수 있습니다</p>
        </div>
      </div>
      <div class="det-nav">
        <button class="nav-btn" onclick="navDet(-1)" ${curIdx===0?'disabled':''}>
          <span class="nav-lbl">← 이전</span>
          <span>${curIdx>0?P[curIdx-1].id:''}</span>
        </button>
        <button class="nav-btn" onclick="navDet(1)" ${curIdx===P.length-1?'disabled':''}>
          <span class="nav-lbl">다음 →</span>
          <span>${curIdx<P.length-1?P[curIdx+1].id:''}</span>
        </button>
      </div>
    </div>`;
}
renderFilter();
renderCards();
</script>
