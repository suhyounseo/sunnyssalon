<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>써니스살롱 2026 S/S Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--warm:#FFFDF9;--charcoal:#2C2825;--gray:#7A7470;--light:#E8E4DF;--accent:#C8A882;--dark:#A07850}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#F0ECE6;color:var(--charcoal)}
.index-page{padding:60px 40px}
.idx-header{text-align:center;margin-bottom:56px;padding:60px 20px 40px}
.idx-header .brand-en{font-size:.72rem;letter-spacing:.35em;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
.idx-header h1{font-family:'Noto Serif KR',serif;font-size:3rem;font-weight:700;letter-spacing:.04em;margin-bottom:14px;color:var(--charcoal)}
.idx-header .season{font-size:.78rem;letter-spacing:.22em;color:var(--gray);text-transform:uppercase;margin-bottom:0}
.idx-header .divider{width:40px;height:1px;background:var(--accent);margin:16px auto}
.trader-section{max-width:1100px;margin:0 auto 52px}
.trader-title{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:600;color:var(--dark);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--accent);padding-bottom:8px;margin-bottom:20px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.product-card{background:var(--warm);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;border:1.5px solid transparent}
.product-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(200,168,130,.2);transform:translateY(-3px)}
.card-thumb{aspect-ratio:3/4;background:var(--cream);overflow:hidden;position:relative}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.product-card:hover .card-thumb img{transform:scale(1.06)}
.card-thumb .no-img{display:flex;align-items:center;justify-content:center;height:100%;color:var(--accent);font-size:.75rem;flex-direction:column;gap:8px;opacity:.5}
.card-body{padding:14px 14px 16px}
.card-id{font-size:.7rem;color:var(--gray);letter-spacing:.07em;margin-bottom:4px}
.card-name{font-family:'Noto Serif KR',serif;font-size:.88rem;font-weight:600;color:var(--charcoal);margin-bottom:4px;line-height:1.4}
.card-color{font-size:.77rem;color:var(--gray);margin-bottom:8px}
.card-price{font-size:.9rem;font-weight:700;color:var(--dark)}
.card-cat{display:inline-block;font-size:.68rem;padding:3px 8px;background:var(--light);border-radius:20px;color:var(--gray);margin-top:6px}
.detail-page{display:none;min-height:100vh;background:var(--warm)}
.detail-page.active{display:block}
.top-bar{background:var(--charcoal);color:white;padding:14px 40px;display:flex;align-items:center;gap:16px}
.back-btn{font-size:.8rem;color:var(--accent);cursor:pointer;border:1px solid var(--accent);padding:5px 14px;border-radius:4px;transition:all .2s;white-space:nowrap}
.back-btn:hover{background:var(--accent);color:white}
.breadcrumb{font-size:.78rem;color:rgba(255,255,255,.45);letter-spacing:.04em}
.detail-wrap{max-width:980px;margin:0 auto;padding:56px 40px 100px}
.detail-top{display:grid;grid-template-columns:1fr 1fr;gap:56px;margin-bottom:64px}
.gallery{display:flex;flex-direction:column;gap:10px}
.gallery-main{border-radius:14px;overflow:hidden;background:var(--cream);aspect-ratio:3/4;position:relative}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:opacity .3s}
.gallery-main .placeholder{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--accent);opacity:.4}
.gallery-thumbs{display:flex;gap:8px;flex-wrap:wrap}
.gallery-thumbs img{width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .2s;opacity:.7}
.gallery-thumbs img.active,.gallery-thumbs img:hover{border-color:var(--accent);opacity:1}
.gdrive-link{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;color:var(--accent);text-decoration:none;margin-top:8px;padding:6px 12px;border:1px solid var(--accent);border-radius:20px;transition:all .2s}
.gdrive-link:hover{background:var(--accent);color:white}
.detail-info{padding-top:8px;display:flex;flex-direction:column}
.d-trader{font-size:.73rem;letter-spacing:.14em;color:var(--dark);text-transform:uppercase;margin-bottom:8px}
.d-name{font-family:'Noto Serif KR',serif;font-size:1.9rem;font-weight:700;line-height:1.3;color:var(--charcoal);margin-bottom:4px}
.d-id{font-size:.78rem;color:var(--gray);margin-bottom:18px}
.d-price{font-size:1.7rem;font-weight:700;color:var(--charcoal);margin-bottom:22px;letter-spacing:-.02em}
.d-desc{font-size:.88rem;line-height:1.9;color:var(--gray);margin-bottom:24px;padding:18px;background:var(--cream);border-radius:10px;border-left:3px solid var(--accent)}
.color-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1.5px solid var(--light);border-radius:8px;font-size:.83rem;margin-bottom:22px}
.cdot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--light)}
.section{margin-bottom:46px}
.sec-title{font-family:'Noto Serif KR',serif;font-size:.97rem;font-weight:600;color:var(--charcoal);letter-spacing:.07em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--light)}
.mat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mat-card{background:var(--cream);border-radius:10px;padding:16px;text-align:center}
.mat-label{font-size:.68rem;color:var(--gray);letter-spacing:.1em;margin-bottom:6px}
.mat-value{font-size:.86rem;font-weight:600;color:var(--charcoal);line-height:1.5}
.size-table{width:100%;border-collapse:collapse;font-size:.86rem}
.size-table th{background:var(--charcoal);color:white;padding:11px 14px;text-align:center;font-weight:500;font-size:.78rem}
.size-table td{padding:11px 14px;text-align:center;border-bottom:1px solid var(--light);color:var(--charcoal)}
.size-table tr:nth-child(even) td{background:var(--cream)}
.size-table td:first-child{font-weight:700;color:var(--dark)}
.wear-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.wear-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--cream);border-radius:8px;font-size:.86rem}
.wi-lbl{color:var(--gray)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.73rem;font-weight:600}
.b-yes{background:#E8F5E9;color:#388E3C}
.b-no{background:#FAFAFA;color:#999}
.b-some{background:#FFF8E1;color:#F57C00}
.model-bar{background:var(--charcoal);color:white;border-radius:10px;padding:18px 24px;display:flex;gap:32px;flex-wrap:wrap}
.ms{text-align:center}
.ms-lbl{font-size:.68rem;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:3px}
.ms-val{font-size:1rem;font-weight:700;color:var(--accent)}
.notice-box{background:linear-gradient(135deg,#FFF8F0,#FAF0E8);border:1px solid var(--accent);border-radius:10px;padding:18px 22px}
.notice-box p{font-size:.82rem;color:var(--gray);line-height:1.9;padding-left:1em;text-indent:-1em}
.notice-box p::before{content:'• ';color:var(--accent)}
.det-nav{display:flex;justify-content:space-between;margin-top:56px;padding-top:28px;border-top:1px solid var(--light)}
.nav-btn{display:flex;align-items:center;gap:8px;padding:11px 18px;border:1.5px solid var(--light);border-radius:8px;cursor:pointer;transition:all .2s;background:white;font-size:.83rem;color:var(--charcoal)}
.nav-btn:hover{border-color:var(--accent);background:var(--cream)}
.nav-btn.disabled{opacity:.3;pointer-events:none}
@media(max-width:700px){.detail-top{grid-template-columns:1fr;gap:28px}.mat-grid{grid-template-columns:1fr 1fr}.wear-grid{grid-template-columns:1fr}.index-page{padding:36px 18px}.detail-wrap{padding:36px 18px 80px}.top-bar{padding:12px 18px}.idx-header h1{font-size:1.9rem}}
</style>
</head>

function getImgs(p){return imgMap[p.id]||[]}

function renderIndex(){
  const traders={};
  products.forEach(p=>{if(!traders[p.trader])traders[p.trader]=[];traders[p.trader].push(p);});
  let html='';
  for(const[trader,items] of Object.entries(traders)){
    html+=`<div class="trader-section"><div class="trader-title">${trader} <small style="font-weight:400;color:var(--gray)">(${items.length}개)</small></div><div class="product-grid">`;
    items.forEach(p=>{
      const imgs=getImgs(p);
      const thumb=imgs.length>0
        ?`<img src="${driveImg(imgs[0])}" alt="${p.id}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        :'';
      const noImg=`<div class="no-img" style="${imgs.length>0?'display:none':''}"><svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>`;
      html+=`<div class="product-card" onclick="showDetail(${p.no})">
        <div class="card-thumb">${thumb}${noImg}</div>
        <div class="card-body">
          <div class="card-id">No.${p.no}</div>
          <div class="card-name">${p.id}</div>
          <div class="card-color">${p.color||'—'}</div>
          <div class="card-price">₩${p.price}</div>
          <div class="card-cat">${p.cat}</div>
        </div>
      </div>`;
    });
    html+='</div></div>';
  }
  document.getElementById('index-content').innerHTML=html;
}

let curIdx=0;
function showDetail(no){
  const idx=products.findIndex(p=>p.no===no);
  if(idx<0)return;
  curIdx=idx;
  const p=products[idx];
  let el=document.getElementById(`det-${no}`);
  if(!el){el=buildDetail(p,idx);document.getElementById('detail-pages').appendChild(el);}
  document.getElementById('index-page').style.display='none';
  document.querySelectorAll('.detail-page').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('index-page').style.display='';
  document.querySelectorAll('.detail-page').forEach(e=>e.classList.remove('active'));
  window.scrollTo(0,0);
}
function navProd(dir){
  const ni=curIdx+dir;
  if(ni>=0&&ni<products.length)showDetail(products[ni].no);
}
function switchImg(no,fileId,el){
  const main=document.querySelector(`#det-${no} .gallery-main img`);
  if(main)main.src=driveImg(fileId);
  document.querySelectorAll(`#det-${no} .gallery-thumbs img`).forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
}

function buildDetail(p,idx){
  const imgs=getImgs(p);
  const hasSize=p.s.c!=='';
  const hasModel=p.model.h!=='';

  let galleryHtml='';
  if(imgs.length>0){
    galleryHtml=`
      <div class="gallery-main"><img src="${driveImg(imgs[0])}" alt="${p.id}" id="main-${p.no}"></div>
      <div class="gallery-thumbs">
        ${imgs.slice(0,8).map((id,i)=>`<img src="${driveImg(id)}" class="${i===0?'active':''}" onclick="switchImg(${p.no},'${id}',this)" loading="lazy">`).join('')}
      </div>
      <a href="${driveFolderUrl(p.folderId)}" target="_blank" class="gdrive-link">📁 전체 사진 보기 (${imgs.length}장+)</a>`;
  } else {
    galleryHtml=`
      <div class="gallery-main"><div class="placeholder"><svg width="52" height="52" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div></div>
      <a href="${driveFolderUrl(p.folderId)}" target="_blank" class="gdrive-link">📁 Google Drive에서 사진 보기</a>`;
  }

  const szR=hasSize?`<tr><td>S (55)</td><td>${vv(p.s.c)}</td><td>${vv(p.s.w)}</td><td>${vv(p.s.h)}</td><td>${vv(p.s.l)}</td></tr><tr><td>M (66)</td><td>${vv(p.m.c)}</td><td>${vv(p.m.w)}</td><td>${vv(p.m.h)}</td><td>${vv(p.m.l)}</td></tr><tr><td>L (77)</td><td>${vv(p.l.c)}</td><td>${vv(p.l.w)}</td><td>${vv(p.l.h)}</td><td>${vv(p.l.l)}</td></tr>`:`<tr><td colspan="5" style="color:var(--gray);padding:18px;text-align:center">사이즈 정보 미입력</td></tr>`;

  const modelH=hasModel?`<div class="section"><div class="sec-title">모델 착용 정보</div><div class="model-bar"><div class="ms"><div class="ms-lbl">키</div><div class="ms-val">${p.model.h}cm</div></div><div class="ms"><div class="ms-lbl">체중</div><div class="ms-val">${p.model.w}kg</div></div>${p.model.c?`<div class="ms"><div class="ms-lbl">가슴</div><div class="ms-val">${p.model.c}cm</div></div>`:''} ${p.model.wa?`<div class="ms"><div class="ms-lbl">허리</div><div class="ms-val">${p.model.wa}</div></div>`:''} ${p.model.sz?`<div class="ms"><div class="ms-lbl">착용 사이즈</div><div class="ms-val">${p.model.sz}</div></div>`:''}</div></div>`:'' ;
  const wearH=(p.stretch||p.inner||p.see||p.thick||p.zipper)?`<div class="section"><div class="sec-title">착용 특성</div><div class="wear-grid"><div class="wear-item"><span class="wi-lbl">신축성</span>${badge(p.stretch,'s')}</div><div class="wear-item"><span class="wi-lbl">안감</span>${badge(p.inner)}</div><div class="wear-item"><span class="wi-lbl">비침</span>${badge(p.see)}</div><div class="wear-item"><span class="wi-lbl">두께감</span><span class="badge b-no">${vv(p.thick)}</span></div><div class="wear-item"><span class="wi-lbl">지퍼</span><span class="badge b-no">${vv(p.zipper)}</span></div></div></div>`:'';

  const div=document.createElement('div');
  div.className='detail-page';
  div.id=`det-${p.no}`;
  div.innerHTML=`
    <div class="top-bar"><span class="back-btn" onclick="goBack()">← 목록으로</span><span class="breadcrumb">${p.trader} · ${p.id} · No.${p.no}</span></div>
    <div class="detail-wrap">
      <div class="detail-top">
        <div class="gallery">${galleryHtml}</div>
        <div class="detail-info">
          <div class="d-trader">${p.trader}</div>
          <div class="d-name">${p.desc||p.id}</div>
          <div class="d-id">${p.id}</div>
          ${p.color?`<div class="color-badge"><span class="cdot" style="background:${colorCSS(p.color)}"></span>${p.color}</div>`:''}
          <div class="d-price">₩${p.price}</div>
          ${p.desc?`<div class="d-desc">${p.desc}</div>`:''}
        </div>
      </div>
      <div class="section"><div class="sec-title">소재 정보</div><div class="mat-grid"><div class="mat-card"><div class="mat-label">겉감</div><div class="mat-value">${vv(p.fabric)}</div></div><div class="mat-card"><div class="mat-label">안감</div><div class="mat-value">${vv(p.lining)}</div></div><div class="mat-card"><div class="mat-label">세탁방법</div><div class="mat-value">${vv(p.wash)}</div></div></div></div>
      <div class="section"><div class="sec-title">사이즈 가이드 (실측, cm)</div><table class="size-table"><thead><tr><th>사이즈</th><th>가슴</th><th>허리</th><th>엉덩이</th><th>기장</th></tr></thead><tbody>${szR}</tbody></table></div>
      ${wearH}${modelH}
      <div class="section"><div class="sec-title">세탁 및 주의사항</div><div class="notice-box"><p>${p.wash}</p><p>세탁 시 단독 세탁을 권장합니다</p><p>직사광선을 피해 건조하세요</p><p>색상은 모니터 환경에 따라 실제와 다소 차이가 있을 수 있습니다</p><p>상품 특성상 1~3cm 오차가 있을 수 있습니다</p></div></div>
      <div class="det-nav"><button class="nav-btn${idx===0?' disabled':''}" onclick="navProd(-1)">← 이전 ${idx>0?`<small style="color:var(--gray)">${products[idx-1].id}</small>`:''}</button><button class="nav-btn${idx===products.length-1?' disabled':''}" onclick="navProd(1)">${idx<products.length-1?`<small style="color:var(--gray)">${products[idx+1].id}</small>`:''} 다음 →</button></div>
    </div>`;
  return div;
}

renderIndex();
</script>
